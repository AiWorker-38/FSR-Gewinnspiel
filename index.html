<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSR Gewinnspiel</title>
<style>
  :root {
    --blue: #1a3a6b;
    --blue-dark: #12294d;
    --gold: #FFD700;
  }

  * {
    box-sizing: border-box;
  }

  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, var(--blue-dark), var(--blue));
    min-height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #222;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
  }

  .header h1 {
    color: var(--gold);
    font-size: 2.4em;
    font-weight: 800;
    margin: 0 0 6px;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  }

  .header p.subtitle {
    color: #fff;
    font-size: 1.15em;
    margin: 0;
    font-weight: 500;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
    padding: 36px;
    max-width: 460px;
    width: 100%;
    border-top: 6px solid var(--gold);
  }

  p.intro {
    text-align: center;
    color: #555;
    margin-top: 0;
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-weight: bold;
    margin-bottom: 6px;
    color: var(--blue);
  }

  input[type="text"],
  input[type="email"] {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 2px solid #dfe4ee;
    border-radius: 8px;
    font-size: 1em;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  input:focus {
    outline: none;
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(26, 58, 107, 0.15);
  }

  button {
    width: 100%;
    padding: 14px;
    background: var(--gold);
    color: var(--blue-dark);
    border: none;
    border-radius: 8px;
    font-size: 1.1em;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.1s ease;
  }

  button:hover {
    background: #f0c800;
  }

  button:active {
    transform: scale(0.98);
  }

  button:disabled {
    background: #d8d8d8;
    color: #888;
    cursor: not-allowed;
  }

  #result {
    margin-top: 20px;
    text-align: center;
    font-weight: bold;
    border-radius: 8px;
    padding: 0;
  }

  #result.success {
    color: #14532d;
    background: #e8f5e9;
    padding: 14px;
  }

  #result.error {
    color: #b71c1c;
    background: #ffebee;
    padding: 14px;
  }

  footer {
    margin-top: 24px;
    text-align: center;
    color: rgba(255, 255, 255, 0.85);
    font-size: 0.85em;
    max-width: 460px;
  }

  @media (max-width: 480px) {
    .header h1 {
      font-size: 1.9em;
    }

    .header p.subtitle {
      font-size: 1em;
    }

    .card {
      padding: 28px 22px;
      border-radius: 14px;
    }
  }
</style>
</head>
<body>

  <div class="header">
    <h1>FSR Gewinnspiel</h1>
    <p class="subtitle">Gewinne einen Fußballcamp-Gutschein!</p>
  </div>

  <div class="card">
    <p class="intro">Beantworte die Frage und nimm an unserem Gewinnspiel teil!</p>

    <form id="gewinnspielForm">
      <input type="hidden" name="access_key" value="a92add17-c35f-4efa-8a17-ac4742223df3">
      <input type="hidden" name="subject" value="Neue Teilnahme am Fussballschule Renchtal Gewinnspiel">

      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">E-Mail-Adresse</label>
      <input type="email" id="email" name="email" required>

      <label for="antwort">Wie viele Fußbälle sind in dem Smart?</label>
      <input type="text" id="antwort" name="antwort" required>

      <button type="submit" id="submitBtn">Jetzt teilnehmen!</button>
    </form>

    <div id="result"></div>
  </div>

  <footer>
    © Fussballschule Renchtal – Jede Person darf nur einmal teilnehmen.
  </footer>

  <script>
    const form = document.getElementById('gewinnspielForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', function (event) {
      event.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = 'Wird gesendet...';
      result.className = '';
      result.textContent = '';

      const formData = new FormData(form);

      fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Accept': 'application/json' },
        body: formData
      })
        .then((response) => response.json())
        .then((data) => {
          if (data.success) {
            result.className = 'success';
            result.textContent = 'Vielen Dank für deine Teilnahme! Wir haben deine Antwort erhalten und wünschen dir viel Glück!';
            form.reset();
          } else {
            result.className = 'error';
            result.textContent = 'Es gab ein Problem beim Absenden. Bitte versuche es später erneut.';
          }
        })
        .catch(() => {
          result.className = 'error';
          result.textContent = 'Es gab ein Problem beim Absenden. Bitte überprüfe deine Internetverbindung und versuche es erneut.';
        })
        .finally(() => {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Jetzt teilnehmen!';
        });
    });
  </script>

</body>
</html>
